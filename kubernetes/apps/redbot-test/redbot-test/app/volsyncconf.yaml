---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: redbot-test-config
  namespace: redbot-test
spec:
  copyMethod: Snapshot
  mover:
    cache:
      capacity: 8Gi
      storageClassName: local-path
    podSecurityContext:
      fsGroup: 568
      runAsGroup: 568
      runAsUser: 568
  repository:
    kind: Repository
    name: backup-target
  retention:
    keepDaily: 7
    keepHourly: 24
    keepWeekly: 5
  sources:
  - pvc:
      name: redbot-test-config
  volumeSnapshotClassName: csi-ceph-blockpool
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: redbot-test-config
  namespace: redbot-test
spec:
  policyRef:
    name: redbot-test-config
  schedule:
    cron: 0 * * * *
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: redbot-test-data
  namespace: redbot-test
spec:
  copyMethod: Snapshot
  mover:
    cache:
      capacity: 8Gi
      storageClassName: local-path
    podSecurityContext:
      fsGroup: 568
      runAsGroup: 568
      runAsUser: 568
  repository:
    kind: Repository
    name: backup-target
  retention:
    keepDaily: 7
    keepHourly: 24
    keepWeekly: 5
  sources:
  - pvc:
      name: redbot-test-data
  volumeSnapshotClassName: csi-ceph-blockpool
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: redbot-test-data
  namespace: redbot-test
spec:
  policyRef:
    name: redbot-test-data
  schedule:
    cron: 0 * * * *

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
spec:
  interval: 30m
  chart:
    spec:
      chart: volsync
      version: 0.18.5
      sourceRef:
        kind: HelmRepository
        name: perfectrain-backube
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: snapshot-controller
      namespace: kube-system
  values:
    manageCRDs: true
    image:
      # https://github.com/backube/volsync/issues/828
      repository: &image ghcr.io/perfectra1n/volsync
      tag: &tag 0.17.11
    rclone:
      repository: *image
      tag: *tag
    restic:
      repository: *image
      tag: *tag
    kopia:
      repository: *image
      tag: *tag
    metrics:
      disableAuth: true

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: backup-target
spec:
  allowedNamespaces:
    all: true
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: 10.0.30.12
          path: /mnt/THICCBOI1/K8s-NFS/kopia
  encryption:
    passwordSecretRef:
      name: kopiur-repo-secret
      namespace: kopiur
      key: KOPIA_PASSWORD
  scheduleDefaults:
    timezone: America/New_York

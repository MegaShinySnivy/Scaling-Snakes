# ============================================================================
# kopiur migrate volsync
#
# restic-mover sources: CONFIG TRANSLATION ONLY
#
# A VolSync restic repository is NOT a kopia repository. NO backup data is
# migrated; the kopiur repository referenced below starts EMPTY and fills as
# kopiur takes its own snapshots. Keep VolSync (and its repository) until
# kopiur's retention coverage is sufficient for your recovery needs.
#
# Review the per-field accounting printed on stderr before applying.
# ============================================================================
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: radarr
  namespace: default
spec:
  copyMethod: Snapshot
  mover:
    cache:
      capacity: 8Gi
      storageClassName: local-path
    podSecurityContext:
      fsGroup: 568
      runAsGroup: 568
      runAsUser: 568
  repository:
    kind: ClusterRepository
    name: backup-target
  retention:
    keepDaily: 7
    keepHourly: 24
    keepWeekly: 5
  sources:
  - pvc:
      name: radarr-config
  volumeSnapshotClassName: csi-ceph-blockpool
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: radarr
  namespace: default
spec:
  policyRef:
    name: radarr
  schedule:
    cron: 0 * * * *
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: radarr
  namespace: default
spec:
  source:
    fromPolicy:
      name: radarr
      namespace: default
      offset: 0
  target:
    populator: {}

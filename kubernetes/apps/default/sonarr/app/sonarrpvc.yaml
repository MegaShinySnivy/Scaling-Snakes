---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-config
  namespace: default
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: csi-ceph-blockpool
  dataSourceRef:
    kind: Restore
    apiGroup: kopiur.home-operations.com
    name: sonarr
  resources:
    requests:
      storage: 8Gi


---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: thelounge
  namespace: default
spec:
  copyMethod: Snapshot
  mover:
    cache:
      capacity: 16Gi
      storageClassName: local-path
    podSecurityContext:
      fsGroup: 1000
      runAsGroup: 1000
      runAsUser: 1000
  repository:
    kind: ClusterRepository
    name: backup-target
  retention:
    keepDaily: 7
    keepHourly: 24
    keepWeekly: 5
  sources:
  - pvc:
      name: thelounge-config
  volumeSnapshotClassName: csi-ceph-blockpool
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: thelounge
  namespace: default
spec:
  policyRef:
    name: thelounge
  schedule:
    cron: 0 * * * *
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: thelounge
  namespace: default
spec:
  source:
    fromPolicy:
      name: thelounge
      namespace: default
      offset: 0
  target:
    populator: {}
